/* ── REPORT COMPUTATION ─────────────────────────────────────── */
const computeReport = (answers, candidateInfo, startedAt, autoSubmitted) => {
  const now = Date.now();
  const durationSec = Math.round((now-startedAt)/1000);
  const partACorrect = PART_A.filter(q=>answers[q.id]===ANSWER_KEY[q.id]).length;
  const partBCorrect = PART_B.filter(q=>answers[q.id]===ANSWER_KEY[q.id]).length;
  const c1Correct = PART_B.slice(0,18).filter(q=>answers[q.id]===ANSWER_KEY[q.id]).length;
  const c2Correct = PART_B.slice(18,36).filter(q=>answers[q.id]===ANSWER_KEY[q.id]).length;
  const total = partACorrect+partBCorrect;
  const grammarAreas = GRAMMAR_AREAS.map(area=>({...area,score:area.qids.filter(qid=>answers[qid]===ANSWER_KEY[qid]).length}));
  const cefrBand = getCEFRBand(total);
  const areaFeedback = {};
  grammarAreas.forEach(a=>{areaFeedback[a.name]=AREA_NARRATIVES[a.name]?.[a.score]??""});
  const vocabFeedback = {c1:VOCAB_NARRATIVES.C1[getVocabLevel(c1Correct,18)],c2:VOCAB_NARRATIVES.C2[getVocabLevel(c2Correct,18)]};
  const weakAreas = grammarAreas.filter(a=>a.score<=1).map(a=>a.name);
  return {reportVersion:APP_VERSION,candidateInfo,submittedAt:now,startedAt,durationSec,autoSubmitted,answers,
    scores:{partA:{correct:partACorrect,total:36,pct:Math.round((partACorrect/36)*100)},partB:{correct:partBCorrect,total:36,pct:Math.round((partBCorrect/36)*100)},total:{correct:total,total:72,pct:Math.round((total/72)*100)},vocab:{c1:{correct:c1Correct,total:18,pct:Math.round((c1Correct/18)*100)},c2:{correct:c2Correct,total:18,pct:Math.round((c2Correct/18)*100)}}},
    grammarAreas,cefrBand,reportSnapshot:{generatedAt:now,areaFeedback,vocabFeedback,weakAreas,recommendation:cefrBand.recommendation}};
};

/* ── GAS SUBMISSION — works from both HTTP and file:// ──────── */
const submitToGAS = async (payload) => {
  const jsonStr = JSON.stringify(payload);

  // Primary: normal fetch (works from localhost / any web server)
  if (window.location.protocol !== "file:") {
    const res = await fetch(GAS_WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: jsonStr,
    });
    const json = await res.json();
    return json; // { ok, submissionId, percentileRank, cohortSize, cohortMean }
  }

  // Fallback for file:// — inject a hidden form POST (fire-and-forget, no response)
  // Data still saves to Google Sheet; percentile cannot be returned.
  return new Promise((resolve) => {
    try {
      const form = document.createElement("form");
      form.method  = "POST";
      form.action  = GAS_WEB_APP_URL;
      form.target  = "gas_target";
      const inp = document.createElement("input");
      inp.type  = "hidden";
      inp.name  = "payload";
      inp.value = jsonStr;
      form.appendChild(inp);
      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);
      setTimeout(()=>resolve({ok:true,fileMode:true}), 1500);
    } catch(e) {
      resolve({ok:false, error: e.message});
    }
  });
};

/* ── RADAR CHART (pure SVG) ─────────────────────────────────── */
function RadarChart({areaScores}) {
  const W=460,H=440,CX=230,CY=215,R=120,LR=158,N=12;
  const ang=i=>-Math.PI/2+(i*2*Math.PI)/N;
  const pt=(i,val)=>{const a=ang(i),r=(val/3)*R;return[CX+r*Math.cos(a),CY+r*Math.sin(a)];};
  const labelPt=i=>{const a=ang(i);return[CX+LR*Math.cos(a),CY+LR*Math.sin(a)];};
  const anchor=i=>{const c=Math.cos(ang(i));return c>0.2?"start":c<-0.2?"end":"middle";};
  const gridPoly=lv=>Array.from({length:N},(_,i)=>pt(i,lv).join(",")).join(" ");
  const dataPoly=areaScores.map((s,i)=>pt(i,s).join(",")).join(" ");
  const SHORT=["Tenses","Adj. Clauses","Noun Clauses","Adv. I","Adv. II","Adv. III","Conditionals","Act./Passive","Gerunds","Rep. Speech","Collocations","Subj-Verb"];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full max-w-sm mx-auto select-none">
      {[1,2,3].map(lv=><polygon key={lv} points={gridPoly(lv)} fill="none" stroke={lv===3?"#cbd5e1":"#e2e8f0"} strokeWidth={lv===3?1.5:1}/>)}
      {Array.from({length:N},(_,i)=>{const[x,y]=pt(i,3);return<line key={i} x1={CX} y1={CY} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1"/>;}) }
      <polygon points={dataPoly} fill="rgba(14,165,233,0.18)" stroke="#0ea5e9" strokeWidth="2"/>
      {areaScores.map((s,i)=>{const[x,y]=pt(i,s);return<circle key={i} cx={x} cy={y} r="4.5" fill="#0ea5e9"/>;}) }
      {[1,2,3].map(lv=>{const[x,y]=pt(0,lv);return<text key={lv} x={x-4} y={y+3} fontSize="8" fill="#94a3b8" textAnchor="end">{lv}</text>;}) }
      {SHORT.map((lbl,i)=>{const[lx,ly]=labelPt(i);return<text key={i} x={lx} y={ly} textAnchor={anchor(i)} fontSize="9.5" fill="#475569" dominantBaseline="middle">{lbl}</text>;}) }
    </svg>
  );
}

          <div className="flex items-center gap-3 mb-6">
            <div className="flex-shrink-0 w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center font-bold text-sm">A</div>
            <div><h2 className="text-xl font-extrabold text-slate-800">Part A — Applied Grammar</h2><p className="text-slate-400 text-xs mt-0.5">36 questions • Choose the option that best completes each sentence</p></div>
          </div>
          <div className="space-y-5">{PART_A.map((q,i)=><QuestionCard key={q.id} q={q} num={i+1} selected={answers[q.id]} onSelect={k=>setAnswers(p=>({...p,[q.id]:k}))}/>)}</div>
        </section>

        <section className="mb-12">
          <div className="flex items-center gap-3 mb-6">
            <div className="flex-shrink-0 w-8 h-8 rounded-full bg-teal-500 text-white flex items-center justify-center font-bold text-sm">B</div>
            <div><h2 className="text-xl font-extrabold text-slate-800">Part B — Vocabulary</h2><p className="text-slate-400 text-xs mt-0.5">36 questions • Select the word or phrase that best fits each context</p></div>
          </div>
          <div className="space-y-5">{PART_B.map((q,i)=><QuestionCard key={q.id} q={q} num={i+1} selected={answers[q.id]} onSelect={k=>setAnswers(p=>({...p,[q.id]:k}))}/>)}</div>
        </section>

        <div className="bg-white border-2 border-slate-200 rounded-2xl p-6 text-center">
          {submitting?(
            <div className="flex flex-col items-center gap-3 py-2">
              <svg className="animate-spin w-8 h-8 text-sky-500" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
              <p className="text-slate-500 text-sm font-medium">Submitting your test, please wait…</p>
            </div>
          ):(
            <>
              <p className="text-slate-500 text-sm mb-4">{answered<PART_A.length+PART_B.length?`You have ${PART_A.length+PART_B.length-answered} unanswered question(s). You may still submit.`:"All questions answered. You are ready to submit."}</p>
              <button onClick={()=>setShowModal(true)} disabled={submitting} className="bg-sky-500 hover:bg-sky-600 active:bg-sky-700 disabled:bg-sky-300 text-white font-bold px-10 py-4 rounded-xl text-lg transition-colors shadow-lg shadow-sky-200">Submit Test</button>
            </>
          )}
        </div>
      </main>

      {showModal&&!submitting&&<ConfirmModal answeredCount={answered} total={PART_A.length+PART_B.length} onConfirm={()=>handleSubmit(false)} onCancel={()=>setShowModal(false)}/>}
    </div>
  );
}

/* ── RESULTS HELPERS ────────────────────────────────────────── */
function SectionHeader({icon,color,title,subtitle}) {
  const cls={sky:"bg-sky-500",teal:"bg-teal-500"};
  return <div className="flex items-center gap-3 mb-4"><div className={`w-8 h-8 rounded-full ${cls[color]} text-white flex items-center justify-center font-bold text-sm flex-shrink-0`}>{icon}</div><div><h3 className="text-lg font-extrabold text-slate-800">{title}</h3><p className="text-slate-400 text-xs">{subtitle}</p></div></div>;
}
function VocabLevelBlock({levelLabel,qRange,score,total,pct,narrative}) {
  return (
    <div className="p-5">
      <div className="flex items-center justify-between mb-2">
        <div><p className="text-sm font-bold text-slate-700">{levelLabel}</p><p className="text-xs text-slate-400">{qRange}</p></div>
        <span className={`text-sm font-bold px-3 py-1 rounded-full ${areaScoreBadge(score>total*0.67?3:score>total*0.34?2:score>0?1:0)}`}>{score}/{total} ({pct}%)</span>
      </div>
      <div className="h-2 bg-slate-100 rounded-full mb-3 overflow-hidden"><div className={`h-full rounded-full ${scoreBarColor(score,total)}`} style={{width:`${pct}%`}}/></div>
      <p className="text-xs text-slate-500 leading-relaxed">{narrative}</p>
    </div>
  );
}
function ReviewSection({title,questions,answers,isOpen,onToggle}) {
  return (
    <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
      <button onClick={onToggle} className="w-full flex items-center justify-between px-5 py-4 text-left">
        <span className="font-bold text-slate-700 text-sm">{title}<span className="ml-2 text-slate-400 font-normal text-xs">({questions.length} question{questions.length!==1?"s":""})</span></span>
        <svg className={`w-4 h-4 text-slate-400 transition-transform ${isOpen?"rotate-180":""}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
      </button>
      {isOpen&&(
        <div className="divide-y divide-slate-50 border-t border-slate-100">
          {questions.map(q=>{
            const ua=answers[q.id],cor=ANSWER_KEY[q.id],ok=ua===cor,un=!ua;
            const cOpt=q.opts.find(o=>o.k===cor),uOpt=q.opts.find(o=>o.k===ua);
            return (
              <div key={q.id} className="px-5 py-4">
                <div className="flex items-start gap-3">
                  <div className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center mt-0.5 ${un?"bg-slate-200":ok?"bg-emerald-100":"bg-rose-100"}`}>
                    {un?<span className="text-slate-400 text-xs">—</span>:ok?<svg className="w-3.5 h-3.5 text-emerald-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>:<svg className="w-3.5 h-3.5 text-rose-500" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/></svg>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-slate-700 leading-relaxed mb-2"><span className="text-xs font-bold text-slate-400 mr-1.5">Q{q.num}</span>{q.text}</p>
                    <div className="flex flex-wrap gap-2 text-xs">
                      <span className={`px-2.5 py-1 rounded-full font-medium ${un?"bg-slate-100 text-slate-500":ok?"bg-emerald-100 text-emerald-700":"bg-rose-100 text-rose-700"}`}>Your answer: {uOpt?`(${uOpt.k}) ${uOpt.t}`:"Not answered"}</span>
                      {!ok&&<span className="px-2.5 py-1 rounded-full font-medium bg-emerald-100 text-emerald-700">Correct: ({cOpt?.k}) {cOpt?.t}</span>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── SCREEN 3: RESULTS ──────────────────────────────────────── */
function ResultsScreen({result}) {
  const {candidateInfo,scores,grammarAreas,cefrBand,reportSnapshot,durationSec,autoSubmitted,answers,backendData,backendError}=result;
  const [filter,setFilter]=useState("all");
  const [aOpen,setAOpen]=useState(true); const [bOpen,setBOpen]=useState(true);
  const allQ=[...PART_A.map((q,i)=>({...q,part:"A",num:i+1})),...PART_B.map((q,i)=>({...q,part:"B",num:i+1}))];
  const fn=q=>{const u=answers[q.id],c=ANSWER_KEY[q.id];if(filter==="incorrect")return u&&u!==c;if(filter==="unanswered")return!u;return true;};
  const afilt=allQ.filter(q=>q.part==="A").filter(fn);
  const bfilt=allQ.filter(q=>q.part==="B").filter(fn);
  const dur=`${Math.floor(durationSec/60)}m ${durationSec%60}s`;

  return (
    <div className="min-h-screen bg-slate-50">
      <div className="bg-gradient-to-r from-sky-600 to-sky-500 text-white py-10 px-4 no-print">
        <div className="max-w-3xl mx-auto text-center">
          <div className="inline-flex items-center gap-2 bg-white/20 rounded-full px-4 py-1 text-sm font-medium mb-4">
            <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
            Test {autoSubmitted?"Auto-Submitted (Time Expired)":"Submitted Successfully"}
          </div>
          <h1 className="text-3xl font-extrabold mb-2">Diagnostic Report</h1>
          <p className="text-sky-100 text-sm">English Diagnostic Test — Paper I Applied Grammar &amp; Vocabulary</p>
        </div>
      </div>

      <main className="max-w-3xl mx-auto px-4 py-8 space-y-8">
        {/* Candidate info */}
        <div className="bg-white rounded-2xl border border-slate-100 p-6 print-section">
          <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Candidate Information</h2>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            {[["Name",candidateInfo.name],["Candidate ID",candidateInfo.id],["Date",formatDate(candidateInfo.testDate)],["Mode",candidateInfo.mode+(autoSubmitted?" (auto-submitted)":"")]].map(([l,v])=>(
              <div key={l}><p className="text-xs text-slate-400 font-medium mb-0.5">{l}</p><p className="text-sm font-semibold text-slate-700 break-words">{v}</p></div>
            ))}
          </div>
        </div>

        {/* Scores */}
        <div className="grid grid-cols-3 gap-4 print-section">
          {[{label:"Part A",sub:"Applied Grammar",correct:scores.partA.correct,total:36,pct:scores.partA.pct},{label:"Part B",sub:"Vocabulary",correct:scores.partB.correct,total:36,pct:scores.partB.pct},{label:"Final",sub:"Overall Score",correct:scores.total.correct,total:72,pct:scores.total.pct,hi:true}].map(sc=>(
            <div key={sc.label} className={`rounded-2xl p-5 text-center border ${sc.hi?"bg-sky-500 border-sky-400 text-white":"bg-white border-slate-100"}`}>
              <p className={`text-xs font-bold uppercase tracking-widest mb-1 ${sc.hi?"text-sky-100":"text-slate-400"}`}>{sc.label}</p>
              <p className={`text-3xl font-extrabold leading-none mb-0.5 ${sc.hi?"text-white":"text-slate-800"}`}>{sc.correct}<span className={`text-base font-medium ml-0.5 ${sc.hi?"text-sky-200":"text-slate-400"}`}>/{sc.total}</span></p>
              <p className={`text-sm font-semibold ${sc.hi?"text-sky-100":"text-slate-500"}`}>{sc.pct}%</p>
              <p className={`text-xs mt-1 ${sc.hi?"text-sky-200":"text-slate-400"}`}>{sc.sub}</p>
            </div>
          ))}
        </div>

        {/* CEFR Band */}
        <div className={`rounded-2xl border-2 p-6 ${cefrBand.colorCls} print-section`}>
          <div className="flex flex-col sm:flex-row sm:items-start gap-4">
            <div className="flex-1">
              <p className="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">CEFR Level</p>
              <div className="flex items-baseline gap-3 mb-2"><span className="text-4xl font-extrabold">{cefrBand.cefr}</span><span className="text-base font-semibold opacity-80">{cefrBand.label}</span></div>
              <p className="text-sm font-semibold opacity-90 mb-2">{cefrBand.headline}</p>
              <p className="text-sm opacity-80 leading-relaxed">{cefrBand.description}</p>
            </div>
            <div className="flex sm:flex-col gap-4 sm:gap-3 flex-shrink-0">
              <div className="bg-white/50 rounded-xl px-4 py-2.5 text-center"><p className="text-xs font-bold uppercase opacity-60 mb-0.5">IELTS</p><p className="text-base font-extrabold">{cefrBand.ielts}</p></div>
              <div className="bg-white/50 rounded-xl px-4 py-2.5 text-center"><p className="text-xs font-bold uppercase opacity-60 mb-0.5">TOEFL iBT</p><p className="text-base font-extrabold">{cefrBand.toefl}</p></div>
            </div>
          </div>
        </div>

        {/* Cohort ranking */}
        {backendData&&backendData.percentileRank!=null&&!backendData.fileMode?(
          <div className="bg-white rounded-2xl border border-slate-100 p-6 print-section">
            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
              <svg className="w-4 h-4 text-teal-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
              Your Cohort Ranking
            </h3>
            <div className="flex flex-col sm:flex-row items-center gap-6">
              <div className="flex-shrink-0 text-center">
                <div className="w-28 h-28 rounded-full border-8 border-sky-100 flex items-center justify-center mx-auto mb-1" style={{background:`conic-gradient(#0ea5e9 ${backendData.percentileRank*3.6}deg,#e0f2fe ${backendData.percentileRank*3.6}deg)`}}>
                  <div className="w-20 h-20 rounded-full bg-white flex flex-col items-center justify-center"><span className="text-2xl font-extrabold text-sky-600 leading-none">{backendData.percentileRank}</span><span className="text-xs text-slate-400 font-semibold">%ile</span></div>
                </div>
                <p className="text-xs text-slate-500">Top <span className="font-bold text-slate-700">{100-backendData.percentileRank}%</span> of cohort</p>
              </div>
              <div className="flex-1 space-y-3 w-full">
                <div><div className="flex justify-between text-xs text-slate-500 mb-1"><span>Your score</span><span className="font-bold text-slate-700">{scores.total.correct}/72</span></div><div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-sky-500 rounded-full" style={{width:`${scores.total.pct}%`}}/></div></div>
                {backendData.cohortMean!=null&&<div><div className="flex justify-between text-xs text-slate-500 mb-1"><span>Cohort average</span><span className="font-bold text-slate-700">{backendData.cohortMean}/72</span></div><div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-slate-300 rounded-full" style={{width:`${Math.round((backendData.cohortMean/72)*100)}%`}}/></div></div>}
                <p className="text-xs text-slate-400 pt-1">Based on <span className="font-semibold text-slate-600">{backendData.cohortSize}</span> submission{backendData.cohortSize!==1?"s":""} to date.</p>
              </div>
            </div>
          </div>
        ):backendData&&backendData.fileMode?(
          <div className="bg-sky-50 border border-sky-200 rounded-2xl p-4 flex items-start gap-3 no-print">
            <svg className="w-5 h-5 text-sky-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd"/></svg>
            <p className="text-sm text-sky-800">Your results have been submitted. Cohort ranking will be available when the test is accessed via a web server.</p>
          </div>
        ):backendError?(
          <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-start gap-3 no-print">
            <svg className="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd"/></svg>
            <div><p className="text-sm font-semibold text-amber-800">Results could not be saved to the server.</p><p className="text-xs text-amber-700 mt-0.5">Your diagnostic report is shown below. Please inform your teacher and ask them to record your result manually.</p></div>
          </div>
        ):null}

        {/* Grammar */}
        <section className="print-section">
          <SectionHeader icon="A" color="sky" title="Part A — Applied Grammar" subtitle={`Score: ${scores.partA.correct} / 36 (${scores.partA.pct}%)`}/>
          <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
            <div className="p-6 pb-2"><p className="text-xs text-slate-400 font-semibold uppercase tracking-widest text-center mb-2">Grammar Competency Profile</p><RadarChart areaScores={grammarAreas.map(a=>a.score)}/></div>
            <div className="divide-y divide-slate-100">
              {grammarAreas.map(area=>(
                <div key={area.id} className="px-5 py-4">
                  <div className="flex items-start justify-between gap-3 mb-2"><p className="text-sm font-semibold text-slate-700 flex-1 min-w-0">{area.id}. {area.name}</p><div className={`flex-shrink-0 text-xs font-bold px-2.5 py-1 rounded-full ${areaScoreBadge(area.score)}`}>{area.score}/3</div></div>
                  <div className="h-1.5 bg-slate-100 rounded-full mb-2 overflow-hidden"><div className={`h-full rounded-full ${scoreBarColor(area.score,3)}`} style={{width:`${(area.score/3)*100}%`}}/></div>
                  <p className="text-xs text-slate-500 leading-relaxed">{reportSnapshot.areaFeedback[area.name]}</p>
                </div>
              ))}
            </div>
            <div className="bg-slate-50 px-5 py-4 border-t border-slate-100">
              <p className="text-xs text-slate-500 leading-relaxed">Overall, your assessment results indicate a{scores.partA.pct>=75?" proficient":" developing"} understanding of English grammar.{reportSnapshot.weakAreas.length>0&&<span> Priority areas for improvement include: <strong className="text-slate-700">{reportSnapshot.weakAreas.join(", ")}</strong>.</span>}{" "}Continued practice in the areas identified above will strengthen your grammatical competence.</p>
            </div>
          </div>
        </section>

        {/* Vocabulary */}
        <section className="print-section">
          <SectionHeader icon="B" color="teal" title="Part B — Vocabulary" subtitle={`Score: ${scores.partB.correct} / 36 (${scores.partB.pct}%)`}/>
          <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
            <VocabLevelBlock levelLabel="CEFR C1-Level Vocabulary" qRange="Questions B1 – B18" score={scores.vocab.c1.correct} total={18} pct={scores.vocab.c1.pct} narrative={reportSnapshot.vocabFeedback.c1}/>
            <div className="border-t border-slate-100"><VocabLevelBlock levelLabel="CEFR C2-Level Vocabulary" qRange="Questions B19 – B36" score={scores.vocab.c2.correct} total={18} pct={scores.vocab.c2.pct} narrative={reportSnapshot.vocabFeedback.c2}/></div>
            <div className="bg-slate-50 px-5 py-4 border-t border-slate-100"><p className="text-xs text-slate-500 leading-relaxed">Overall, your assessment results reflect a{scores.partB.pct>=70?" commendable":" developing"} vocabulary trajectory. Strengthening the areas identified for improvement will enhance your lexical range and overall language proficiency.</p></div>
          </div>
        </section>

        {/* Recommendations */}
        <section className="bg-white rounded-2xl border border-slate-100 p-6 print-section">
          <h3 className="text-sm font-bold text-slate-700 uppercase tracking-widest mb-3 flex items-center gap-2">
            <svg className="w-4 h-4 text-sky-500" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd"/></svg>
            Recommendations
          </h3>
          <p className="text-sm text-slate-600 leading-relaxed">{reportSnapshot.recommendation}</p>
          {reportSnapshot.weakAreas.length>0&&<div className="mt-4"><p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Priority Grammar Areas</p><div className="flex flex-wrap gap-2">{reportSnapshot.weakAreas.map(a=><span key={a} className="bg-rose-50 text-rose-700 border border-rose-200 text-xs font-medium px-3 py-1 rounded-full">{a}</span>)}</div></div>}
          <div className="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between text-xs text-slate-400"><span>Duration: {dur}</span><span>Report v{APP_VERSION}</span></div>
        </section>

        {/* Question review */}
        <section className="no-print">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-lg font-bold text-slate-800">Question Review</h3>
            <div className="flex gap-1 bg-slate-100 rounded-xl p-1 text-xs">
              {[["all","All"],["incorrect","Incorrect"],["unanswered","Unanswered"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFilter(v)} className={`px-3 py-1.5 rounded-lg font-semibold transition-all ${filter===v?"bg-white text-slate-800 shadow-sm":"text-slate-500 hover:text-slate-700"}`}>{l}</button>
              ))}
            </div>
          </div>
          {afilt.length>0&&<ReviewSection title="Part A — Applied Grammar" questions={afilt} answers={answers} isOpen={aOpen} onToggle={()=>setAOpen(o=>!o)}/>}
          {bfilt.length>0&&<div className="mt-4"><ReviewSection title="Part B — Vocabulary" questions={bfilt} answers={answers} isOpen={bOpen} onToggle={()=>setBOpen(o=>!o)}/></div>}
          {afilt.length===0&&bfilt.length===0&&<div className="bg-white rounded-2xl border border-slate-100 p-8 text-center text-slate-400">No questions match this filter.</div>}
        </section>

        <div className="text-center pb-4 no-print">
          <button onClick={()=>window.print()} className="inline-flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-6 py-3 rounded-xl transition-colors text-sm">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            Print / Save as PDF
          </button>
        </div>
      </main>
    </div>
  );
}

/* ── ROOT APP ───────────────────────────────────────────────── */
function App() {
  const [screen,setScreen]=useState("passcode");
  const [info,setInfo]=useState(null);
  const [result,setResult]=useState(null);
  return (
    <div>
      {screen==="passcode"&&<PasscodeScreen onSuccess={()=>setScreen("info")}/>}
      {screen==="info"&&<InfoScreen onNext={i=>{setInfo(i);setScreen("quiz");}}/>}
      {screen==="quiz"&&<QuizScreen candidateInfo={info} onSubmit={r=>{setResult(r);setScreen("results");}}/>}
      {screen==="results"&&<ResultsScreen result={result}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
